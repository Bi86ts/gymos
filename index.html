  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .performance-ring { transform: rotate(-90deg); }
    .glass-effect { background: rgba(41, 44, 49, 0.6); backdrop-filter: blur(20px); }
    .kinetic-gradient { background: linear-gradient(135deg, #f3ffca 0%, #cafd00 100%); }
    body { background-color: #0c0e11; color: #f9f9fd; font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0c0e11; }
    ::-webkit-scrollbar-thumb { background: #23262a; border-radius: 10px; }
    * { scrollbar-width: thin; scrollbar-color: #23262a #0c0e11; }

<body class="bg-surface text-on-surface font-body selection:bg-primary selection:text-on-primary antialiased">
