<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GymOS | Kinetic Forge</title>
  <meta name="description" content="GymOS - A gym retention and operating system. Predict, Intervene, Retain, Renew." />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface": "#000000",
            "surface-dim": "#121212",
            "surface-bright": "#1C1C1E",
            "surface-container-lowest": "#000000",
            "surface-container-low": "#121212",
            "surface-container": "#1C1C1E",
            "surface-container-high": "#2C2C2E",
            "surface-container-highest": "#3A3A3C",
            "surface-variant": "#1C1C1E",
            "on-surface": "#FFFFFF",
            "on-surface-variant": "#EBEBF5",
            "primary": "#FF5E00",
            "primary-dim": "#FF4500",
            "primary-container": "#FF5E00",
            "on-primary": "#FFFFFF",
            "on-primary-container": "#FFFFFF",
            "inverse-primary": "#FF8A3D",
            "secondary": "#0A84FF",
            "secondary-dim": "#007AFF",
            "error": "#FF453A",
            "error-dim": "#FF3B30",
            "outline": "#38383A",
            "outline-variant": "#2C2C2E",
            "inverse-surface": "#F2F2F7",
            "inverse-on-surface": "#1C1C1E",
          },
          fontFamily: {
            "headline": ["-apple-system", "BlinkMacSystemFont", "Inter", "sans-serif"],
            "body": ["-apple-system", "BlinkMacSystemFont", "Inter", "sans-serif"],
            "label": ["-apple-system", "BlinkMacSystemFont", "Inter", "sans-serif"]
          },
          borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .performance-ring { transform: rotate(-90deg); }
    .glass-effect { background: rgba(28, 28, 30, 0.4); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); }
    .kinetic-gradient { background: linear-gradient(135deg, #FF8A3D 0%, #FF5E00 100%); }
    body { background-color: #000000; color: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif; font-feature-settings: "cv02", "cv03", "cv04", "cv11"; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #000000; }
    ::-webkit-scrollbar-thumb { background: #2C2C2E; border-radius: 10px; }
    * { scrollbar-width: thin; scrollbar-color: #2C2C2E #000000; }
  </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary selection:text-on-primary antialiased">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
